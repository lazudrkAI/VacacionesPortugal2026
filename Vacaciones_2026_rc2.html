<style>
*{box-sizing:border-box;-webkit-font-smoothing:antialiased}
html{scroll-behavior:smooth}
body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;font-size:15px;color:#1c1c1e;background:#f2f2f7;min-height:100vh}
a{color:#0a84ff;text-decoration:none}

.app-header{position:sticky;top:0;z-index:200;background:rgba(242,242,247,.88);backdrop-filter:saturate(180%) blur(24px);-webkit-backdrop-filter:saturate(180%) blur(24px);border-bottom:1px solid rgba(0,0,0,.08);transition:padding .28s ease;padding:14px 16px 10px}
.header-hero{display:flex;align-items:center;gap:10px;overflow:hidden;max-height:80px;opacity:1;transition:max-height .28s ease,opacity .22s ease,margin .28s ease;margin-bottom:10px}
.app-header.compact .header-hero{max-height:0;opacity:0;margin-bottom:0}
.app-icon{width:42px;height:42px;border-radius:12px;background:linear-gradient(145deg,#1c8c82,#0f5e57);display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;box-shadow:0 2px 8px rgba(15,94,87,.35)}
.app-title{font-size:20px;font-weight:700;letter-spacing:-.3px;color:#1c1c1e}
.app-sub{font-size:12px;color:#8e8e93;margin-top:1px}

.search-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.search-field{flex:1;position:relative}
.search-field input{width:100%;background:rgba(118,118,128,.14);border:none;border-radius:12px;padding:9px 14px 9px 36px;font-size:15px;font-family:inherit;color:#1c1c1e;outline:none;transition:background .15s}
.search-field input::placeholder{color:#8e8e93}
.search-field input:focus{background:rgba(118,118,128,.22)}
.s-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#8e8e93;font-size:14px;pointer-events:none}
.clear-btn{padding:8px 14px;border-radius:12px;font-size:13px;font-weight:600;border:none;background:rgba(118,118,128,.12);color:#636366;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .15s}
.clear-btn:hover{background:rgba(118,118,128,.22)}

.active-chips{display:flex;flex-wrap:wrap;gap:5px;max-height:0;overflow:hidden;opacity:0;transition:max-height .25s ease,opacity .2s ease,margin .25s ease;margin-bottom:0}
.app-header.compact .active-chips.has-filters{max-height:60px;opacity:1;margin-bottom:6px}
.active-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;background:#1c8c82;color:#fff;font-size:12px;font-weight:600;cursor:pointer}
.active-chip.az-chip{background:#d4700a}
.active-chip span{font-size:11px;opacity:.8}

.filter-rows{overflow:hidden;max-height:300px;opacity:1;transition:max-height .35s ease,opacity .25s ease}
.app-header.compact .filter-rows{max-height:0;opacity:0}
.seg-wrap{display:flex;flex-direction:column;gap:5px;margin-bottom:6px}
.seg-label{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8e8e93;padding-left:2px}
.seg-pills{display:flex;flex-wrap:wrap;gap:4px;overflow:visible}
.seg-pill{padding:6px 12px;border-radius:20px;font-size:13px;font-weight:500;border:none;background:rgba(118,118,128,.1);color:#3a3a3c;cursor:pointer;transition:all .15s;font-family:inherit;line-height:1.2}
.seg-pill:hover{background:rgba(118,118,128,.18)}
.seg-pill.ak{background:#1c8c82;color:#fff;box-shadow:0 1px 6px rgba(28,140,130,.3)}
.seg-pill.az{background:#d4700a;color:#fff;box-shadow:0 1px 6px rgba(212,112,10,.3)}

.wrap{max-width:1340px;margin:0 auto;padding:16px}
.page-grid{display:grid;grid-template-columns:268px 1fr;gap:14px;align-items:start}
.sidebar{position:sticky;top:16px;background:rgba(255,255,255,.7);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border:1px solid rgba(255,255,255,.8);border-radius:20px;padding:14px;box-shadow:0 2px 12px rgba(0,0,0,.06);max-height:calc(100vh - 32px);overflow:auto}
.sidebar-label{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8e8e93;margin:0 0 8px;padding:0 4px}
.nav-list{display:flex;flex-direction:column;gap:1px}
.nav-list a{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:11px;color:#1c1c1e;font-size:13.5px;font-weight:500;text-decoration:none;transition:background .12s}
.nav-list a:hover{background:rgba(0,0,0,.04)}
.nav-count{font-size:12px;color:#8e8e93;font-weight:400}
.count-line{font-size:12px;color:#8e8e93;margin:0 0 10px;font-weight:500}

.main-grid{display:grid;gap:13px}
.section{background:rgba(255,255,255,.7);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border:1px solid rgba(255,255,255,.8);border-radius:22px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.section-title{font-size:19px;font-weight:700;letter-spacing:-.2px;color:#1c1c1e;margin:0}
.section-note{font-size:12px;color:#8e8e93;font-weight:500}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:10px}
.card{background:#fff;border-radius:18px;padding:14px;display:flex;flex-direction:column;gap:8px;box-shadow:0 1px 4px rgba(0,0,0,.06),0 4px 14px rgba(0,0,0,.04);transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.1)}
.card-top{display:flex;align-items:flex-start;gap:9px}
.card-icon-wrap{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.card h3{margin:0;font-size:13.5px;font-weight:600;line-height:1.3;color:#1c1c1e;flex:1}
.meta{display:flex;flex-wrap:wrap;gap:4px}
.chip{font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(118,118,128,.1);color:#636366;font-weight:500}
.chip.ck{background:rgba(28,140,130,.1);color:#1c8c82;cursor:pointer;font-weight:600}
.chip.ck:hover{background:rgba(28,140,130,.2)}
.chip.cz{background:rgba(212,112,10,.1);color:#d4700a;cursor:pointer;font-weight:600}
.chip.cz:hover{background:rgba(212,112,10,.2)}
.card p{margin:0;color:#48484a;font-size:13px;line-height:1.5}
.status-row{display:flex;gap:5px;flex-wrap:wrap}
.sbadge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:7px}
.sbadge.ok{background:rgba(52,199,89,.12);color:#1a7a31}
.sbadge.warn{background:rgba(255,159,10,.14);color:#b25000}
.sbadge.close{background:rgba(255,59,48,.12);color:#c0392b}
.sbadge.check{background:rgba(90,100,240,.1);color:#3a35b0}
.kv{display:grid;gap:5px}
.kv-row{padding:6px 9px;background:rgba(242,242,247,.8);border-radius:10px;font-size:12px;color:#3a3a3c}
.kv-row strong{display:block;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:#8e8e93;margin-bottom:2px;font-weight:700}
.kv-row.warn-row{background:rgba(255,159,10,.08);color:#92400e}
.links{margin-top:auto;padding-top:2px}
.btn-map{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:12px;background:#0a84ff;color:#fff;font-weight:600;font-size:13px;font-family:inherit;border:none;cursor:pointer;text-decoration:none;transition:filter .15s}
.btn-map:hover{filter:brightness(1.1);color:#fff;text-decoration:none}

.dest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.dest-card{background:#fff;border-radius:18px;padding:14px;display:flex;flex-direction:column;gap:9px;box-shadow:0 1px 4px rgba(0,0,0,.06),0 4px 14px rgba(0,0,0,.04);transition:transform .15s,box-shadow .15s}
.dest-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.1)}
.dest-header{display:flex;align-items:center;justify-content:space-between;gap:8px}
.dest-name{font-size:16px;font-weight:700;letter-spacing:-.1px;color:#1c1c1e;margin:0}
.dest-badge{font-size:11px;padding:3px 9px;border-radius:20px;background:rgba(212,112,10,.12);color:#b25000;font-weight:700}
.dest-items{display:flex;flex-direction:column;gap:4px}
.dest-item{display:flex;align-items:flex-start;gap:7px;padding:7px 9px;background:rgba(242,242,247,.7);border-radius:11px}
.dest-item-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.dest-item-body{flex:1;min-width:0}
.dest-item-kind{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:#8e8e93;font-weight:700;margin-bottom:1px}
.dest-item-title{font-size:12.5px;font-weight:600;color:#1c1c1e;margin:0 0 1px}
.dest-item-text{font-size:11.5px;color:#636366;line-height:1.4}
.dest-item-status{margin-top:2px}
.dest-links{display:flex;flex-wrap:wrap;gap:5px;padding-top:2px}
.btn-dest{display:inline-flex;align-items:center;gap:4px;padding:6px 11px;border-radius:10px;background:rgba(10,132,255,.08);color:#0a6bc8;font-weight:600;font-size:11.5px;font-family:inherit;border:none;cursor:pointer;text-decoration:none;transition:background .15s}
.btn-dest:hover{background:rgba(10,132,255,.16);text-decoration:none;color:#0a6bc8}

.ico-alojamiento{background:rgba(255,149,0,.12)}
.ico-bar{background:rgba(175,82,222,.12)}
.ico-cultura{background:rgba(90,200,250,.12)}
.ico-evento{background:rgba(255,55,95,.12)}
.ico-musica{background:rgba(255,55,95,.12)}
.ico-naturaleza{background:rgba(52,199,89,.12)}
.ico-paseo{background:rgba(10,132,255,.12)}
.ico-playa{background:rgba(100,210,255,.12)}
.ico-restaurante{background:rgba(255,149,0,.12)}

.empty{padding:36px;border-radius:18px;color:#8e8e93;text-align:center;background:rgba(255,255,255,.6);font-size:15px}
footer{padding:16px 0 6px;color:#8e8e93;font-size:12px;text-align:center}
@media(max-width:960px){.page-grid{grid-template-columns:1fr}.sidebar{position:static;max-height:none}}
</style>

    <div class="seg-wrap">
      <div class="seg-label">Tipo</div>
      <div class="seg-pills" id="kindGroup"></div>
    </div>
    <div class="seg-wrap">
      <div class="seg-label">Zona</div>
      <div class="seg-pills" id="zoneGroup"></div>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="page-grid">
    <aside class="sidebar">
      <p class="sidebar-label">Categorías</p>
      <nav class="nav-list" id="nav"></nav>
    </aside>
    <main>
      <p class="count-line" id="count"></p>
      <div id="sections" class="main-grid"></div>
    </main>
  </div>
  <footer>Gloria 2026 · Viana do Castelo · 61 lugares · Archivo autocontenido</footer>
</div>

<script>
// ── LOAD DATA from embedded JSON tag (fully self-contained) ──────────────────
const DATA = JSON.parse(document.getElementById('gloria-data').textContent);
const KIND_ICONS = {"alojamiento": "🏡", "bar": "🍷", "cultura": "🏛", "evento": "🎭", "música": "🎵", "naturaleza": "🌿", "paseo": "🚶", "playa": "🏖", "restaurante": "🍽"};

const state = {q:'',kind:'',zone:''};
const slug = s=>s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
const cats  = [...new Set(DATA.map(x=>x.cat))];
const kinds = [...new Set(DATA.map(x=>x.kind))].sort((a,b)=>a.localeCompare(b,'es'));
const zones = [...new Set(DATA.map(x=>x.zone))].sort((a,b)=>a.localeCompare(b,'es'));

// ── SCROLL COLLAPSE ──────────────────────────────────────────────────────────
let lastY=0;
const header=document.getElementById('appHeader');
window.addEventListener('scroll',()=>{
  const y=window.scrollY;
  if(y>lastY&&y>60) header.classList.add('compact');
  else header.classList.remove('compact');
  lastY=y;
},{passive:true});

// ── ACTIVE CHIPS ─────────────────────────────────────────────────────────────
function updateActiveChips(){
  const el=document.getElementById('activeChips');
  const chips=[];
  if(state.kind) chips.push(`<span class="active-chip" id="removeKind">${KIND_ICONS[state.kind]||''} ${state.kind} <span>✕</span></span>`);
  if(state.zone) chips.push(`<span class="active-chip az-chip" id="removeZone">${state.zone} <span>✕</span></span>`);
  el.innerHTML=chips.join('');
  el.classList.toggle('has-filters',chips.length>0);
  const rk=document.getElementById('removeKind');
  const rz=document.getElementById('removeZone');
  if(rk) rk.addEventListener('click',()=>setKind(state.kind));
  if(rz) rz.addEventListener('click',()=>setZone(state.zone));
}

// ── STATUS BADGES ─────────────────────────────────────────────────────────────
function statusBadge(d){
  const c=(d.cond||'').toLowerCase();
  const h=(d.hours||'').toLowerCase();
  const b=[];
  if(d.alert||c.includes('verificar')||c.includes('consultar')||h.includes('consultar'))
    b.push('<span class="sbadge check">🔍 Verificar</span>');
  if(c.includes('cierra')||c.includes('cerrado'))
    b.push('<span class="sbadge close">🚫 Cierre</span>');
  if(c.includes('reservar'))
    b.push('<span class="sbadge warn">📞 Reservar</span>');
  if(!b.length) b.push('<span class="sbadge ok">✓ Libre</span>');
  return `<div class="status-row">${b.join('')}</div>`;
}

function icoClass(k){return 'ico-'+(k||'').replace(/\s+/g,'-').toLowerCase();}

// ── FILTER ────────────────────────────────────────────────────────────────────
function filtered(){
  const q=state.q.toLowerCase();
  return DATA.filter(d=>
    (!state.kind||d.kind===state.kind)&&
    (!state.zone||d.zone===state.zone)&&
    (!q||[d.title,d.text,d.zone,d.kind,d.kindOrig||'',d.cat,...d.tags].join(' ').toLowerCase().includes(q))
  );
}

// ── PILLS ─────────────────────────────────────────────────────────────────────
function buildPills(){
  document.getElementById('kindGroup').innerHTML=kinds.map(k=>`<button class="seg-pill" data-kind="${k}">${KIND_ICONS[k]||''} ${k}</button>`).join('');
  document.getElementById('zoneGroup').innerHTML=zones.map(z=>`<button class="seg-pill" data-zone="${z}">${z}</button>`).join('');
}
function syncPills(){
  document.querySelectorAll('[data-kind]').forEach(b=>b.classList.toggle('ak',b.dataset.kind===state.kind));
  document.querySelectorAll('[data-zone]').forEach(b=>b.classList.toggle('az',b.dataset.zone===state.zone));
}

// ── CARD HTML ─────────────────────────────────────────────────────────────────
function cardHTML(d){
  return `<article class="card">
    <div class="card-top">
      <div class="card-icon-wrap ${icoClass(d.kind)}">${KIND_ICONS[d.kind]||'📌'}</div>
      <h3>${d.title}</h3>
    </div>
    <div class="meta">
      <span class="chip ck" data-kind="${d.kind}">${d.kind}</span>
      <span class="chip cz" data-zone="${d.zone}">${d.zone}</span>
      ${d.tags.map(t=>`<span class="chip">${t}</span>`).join('')}
    </div>
    <p>${d.text}</p>
    ${statusBadge(d)}
    <div class="kv">
      <div class="kv-row"><strong>Horario</strong>${d.hours}</div>
      <div class="kv-row${(d.alert||(d.cond||'').toLowerCase().includes('verificar'))?' warn-row':''}"><strong>Condición</strong>${d.cond}</div>
    </div>
    <div class="links"><a class="btn-map" href="${d.maps}" target="_blank" rel="noopener noreferrer">📍 Ver en Maps</a></div>
  </article>`;
}

function destCardHTML(zone,items){
  const rows=items.map(d=>`
    <div class="dest-item">
      <span class="dest-item-icon">${KIND_ICONS[d.kind]||'📌'}</span>
      <div class="dest-item-body">
        <div class="dest-item-kind">${d.kindOrig||d.kind}</div>
        <div class="dest-item-title">${d.title}</div>
        <div class="dest-item-text">${d.text}</div>
        <div class="dest-item-status">${statusBadge(d)}</div>
      </div>
    </div>`).join('');
  const links=items.map(d=>`<a class="btn-dest" href="${d.maps}" target="_blank" rel="noopener">📍 ${d.title}</a>`).join('');
  return `<article class="dest-card">
    <div class="dest-header"><h3 class="dest-name">${zone}</h3><span class="dest-badge">${items.length} lugar${items.length!==1?'es':''}</span></div>
    <div class="dest-items">${rows}</div>
    <div class="dest-links">${links}</div>
  </article>`;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const items=filtered();
  document.getElementById('count').textContent=`${items.length} lugar${items.length!==1?'es':''} visible${items.length!==1?'s':''}`;
  syncPills(); updateActiveChips();
  const grouped={};
  for(const d of items)(grouped[d.cat]??=[]).push(d);
  const sectEl=document.getElementById('sections');
  if(!items.length){sectEl.innerHTML='<div class="empty">Sin resultados — prueba con otro filtro o limpia la búsqueda.</div>';return;}
  sectEl.innerHTML=Object.entries(grouped).map(([cat,arr])=>{
    const head=`<div class="section-head"><h2 class="section-title">${cat}</h2><span class="section-note">${arr.length} elemento${arr.length!==1?'s':''}</span></div>`;
    if(cat!=='Visitas en ruta')
      return `<section class="section" id="${slug(cat)}">${head}<div class="cards">${arr.map(cardHTML).join('')}</div></section>`;
    const byZone={};
    for(const d of arr)(byZone[d.zone]??=[]).push(d);
    const note=`${arr.length} elementos · ${Object.keys(byZone).length} destinos`;
    return `<section class="section" id="${slug(cat)}">
      <div class="section-head"><h2 class="section-title">${cat}</h2><span class="section-note">${note}</span></div>
      <div class="dest-grid">${Object.entries(byZone).map(([z,zi])=>destCardHTML(z,zi)).join('')}</div>
    </section>`;
  }).join('');
  document.querySelectorAll('.chip.ck').forEach(c=>c.addEventListener('click',()=>setKind(c.dataset.kind)));
  document.querySelectorAll('.chip.cz').forEach(c=>c.addEventListener('click',()=>setZone(c.dataset.zone)));
}

function buildNav(){
  const g={};for(const d of DATA)(g[d.cat]??=[]).push(d);
  document.getElementById('nav').innerHTML=Object.entries(g).map(([c,arr])=>
    `<a href="#${slug(c)}">${c}<span class="nav-count">${arr.length}</span></a>`).join('');
}

function setKind(v){state.kind=state.kind===v?'':v;render();}
function setZone(v){state.zone=state.zone===v?'':v;render();}
function clearAll(){state.q='';state.kind='';state.zone='';document.getElementById('search').value='';render();}

document.getElementById('search').addEventListener('input',e=>{state.q=e.target.value.trim();render();});
document.getElementById('clearAll').addEventListener('click',clearAll);
document.getElementById('kindGroup').addEventListener('click',e=>{const b=e.target.closest('[data-kind]');if(b)setKind(b.dataset.kind);});
document.getElementById('zoneGroup').addEventListener('click',e=>{const b=e.target.closest('[data-zone]');if(b)setZone(b.dataset.zone);});

buildNav(); buildPills(); render();
</script>
</body>
</html>
